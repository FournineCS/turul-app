name: Build & Release

# Releases are gated on tag pushes (`v*`).
# Local flow:
#   npm version patch   # or minor / major
#   git push --follow-tags
# A `vX.Y.Z-rc.N` or `vX.Y.Z-beta.N` tag produces a GitHub Release marked as
# pre-release automatically.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Default to read-only at the workflow level; jobs that need to publish opt in.
permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          format: table

      - name: Trivy scan (SARIF upload)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: trivy-results.sarif
        if: always()
        continue-on-error: true

      - name: npm audit
        run: npm audit --omit=dev --audit-level=high

  # ──────────────────────────────────────────────
  # macOS — native builds on matching runners
  # ──────────────────────────────────────────────
  build-mac:
    needs: security-scan
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest       # Apple Silicon
          - arch: x64
            runner: macos-latest     # cross-compile x64 from arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Package for macOS (${{ matrix.arch }})
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: mac-${{ matrix.arch }}
          path: release/*.dmg
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Windows — x64 native, arm64 cross-compiled
  # ──────────────────────────────────────────────
  build-windows:
    needs: security-scan
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Package for Windows (${{ matrix.arch }})
        run: npx electron-builder --win --${{ matrix.arch }} --publish never
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Upload Windows artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: win-${{ matrix.arch }}
          path: release/*.exe
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Linux — x64 native, arm64 cross-compiled
  # ──────────────────────────────────────────────
  build-linux:
    needs: security-scan
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install cross-compilation toolchain (arm64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies
        run: npm ci
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Package for Linux (${{ matrix.arch }})
        run: npx electron-builder --linux --${{ matrix.arch }} --publish never
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Upload Linux artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: linux-${{ matrix.arch }}
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Create GitHub Release with all artifacts
  # ──────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows, build-linux]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve version from tag (or fallback to package.json on workflow_dispatch)
        id: version
        env:
          REF: ${{ github.ref }}
        run: |
          if [[ "$REF" == refs/tags/v* ]]; then
            TAG="${REF#refs/tags/}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          VERSION="${TAG#v}"

          # Verify tag matches package.json on tag-push events.
          if [[ "$REF" == refs/tags/v* ]]; then
            PKG_VERSION=$(node -p "require('./package.json').version")
            if [[ "$VERSION" != "$PKG_VERSION" ]]; then
              echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
              exit 1
            fi
          fi

          # vX.Y.Z-rc.N / -beta.N / -alpha.N → pre-release
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Rename artifacts for release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release-assets

          # macOS
          for arch in arm64 x64; do
            dmg=$(find "artifacts/mac-${arch}" -name "*.dmg" 2>/dev/null | head -1)
            if [ -n "$dmg" ]; then
              cp "$dmg" "release-assets/Turul-${VERSION}-mac-${arch}.dmg"
            fi
          done

          # Windows
          for arch in x64 arm64; do
            exe=$(find "artifacts/win-${arch}" -name "*.exe" 2>/dev/null | head -1)
            if [ -n "$exe" ]; then
              cp "$exe" "release-assets/Turul-${VERSION}-win-${arch}-setup.exe"
            fi
          done

          # Linux
          for arch in x64 arm64; do
            appimage=$(find "artifacts/linux-${arch}" -name "*.AppImage" 2>/dev/null | head -1)
            if [ -n "$appimage" ]; then
              cp "$appimage" "release-assets/Turul-${VERSION}-linux-${arch}.AppImage"
            fi
            deb=$(find "artifacts/linux-${arch}" -name "*.deb" 2>/dev/null | head -1)
            if [ -n "$deb" ]; then
              cp "$deb" "release-assets/Turul-${VERSION}-linux-${arch}.deb"
            fi
          done

          echo "Release assets:"
          ls -lh release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          ARGS=(--title "Turul ${VERSION}" --generate-notes)
          if [[ "$PRERELEASE" == "true" ]]; then
            ARGS+=(--prerelease)
          else
            ARGS+=(--latest)
          fi
          gh release create "$TAG" "${ARGS[@]}" release-assets/*
