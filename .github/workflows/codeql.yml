name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    # Static name (no matrix template) so branch protection can require it
    # by exact match — when the job is skipped (e.g. on Dependabot PRs) the
    # matrix isn't expanded and a templated name would not match.
    name: CodeQL
    # Dependabot PRs run with a downgraded read-only GITHUB_TOKEN, so the
    # SARIF upload fails with "Resource not accessible by integration".
    # The post-merge push to main re-runs CodeQL with a normal token, so
    # we lose nothing by skipping here.
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Security-only. The `security-and-quality` pack produces ~40
          # `js/unused-local-variable` style alerts that overwhelm the
          # security UI; ESLint already enforces those locally.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7 # v4
        with:
          category: '/language:${{ matrix.language }}'
