name: Build & Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  # Only run when a PR is merged (not just closed)
  check-merge:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - run: echo "PR merged or manual trigger — proceeding with build"

  security-scan:
    runs-on: ubuntu-latest
    needs: check-merge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          format: table

      - name: Trivy scan (SARIF upload)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        if: always()
        continue-on-error: true

      - name: npm audit
        run: npm audit --omit=dev --audit-level=high

  build-mac:
    runs-on: [self-hosted, macOS, arm64]
    needs: security-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Package for macOS (arm64)
        run: npx electron-builder --mac --arm64 --publish never
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc codesign (prevents Gatekeeper damaged error)
        run: |
          APP_PATH=$(find release/mac* -name "*.app" -maxdepth 1 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Signing: $APP_PATH"
            codesign --force --deep --sign - "$APP_PATH"
            codesign --verify --verbose "$APP_PATH"
          else
            echo "No .app found, skipping codesign"
          fi

      - name: Rebuild DMG with signed app
        run: |
          rm -f release/*.dmg
          APP_DIR=$(find release -type d -name "mac*" | head -1)
          if [ -n "$APP_DIR" ]; then
            npx electron-builder --mac --arm64 --publish never --prepackaged "$APP_DIR"
          fi
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: release/*.dmg
          if-no-files-found: error

  create-release:
    runs-on: ubuntu-latest
    needs: build-mac
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Rename artifacts for release
        run: |
          mkdir -p release-assets
          VERSION="${{ steps.version.outputs.version }}"
          dmg=$(find "artifacts/mac-arm64" -name "*.dmg" | head -1)
          if [ -n "$dmg" ]; then
            cp "$dmg" "release-assets/FournineCloudAnalyzer-${VERSION}-mac-arm64.dmg"
          fi
          ls -lh release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "Turul ${VERSION}" \
            --generate-notes \
            --latest \
            release-assets/*
