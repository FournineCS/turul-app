version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    # Reviewers come from CODEOWNERS — `reviewers` is deprecated.
    labels:
      - "dependencies"
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
          - "@smithy/*"
      google-cloud:
        patterns:
          - "@google-cloud/*"
          - "google-auth-library"
      electron:
        patterns:
          - "electron"
          - "electron-builder"
          - "@electron/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"

  # GitHub Actions — keep SHA pins fresh
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-core:
        patterns:
          - "actions/*"
          - "github/codeql-action"
    ignore:
      # v5+ broke the build-artifact merge flow; pinned at v4.x.
      - dependency-name: "actions/upload-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/download-artifact"
        update-types: ["version-update:semver-major"]
